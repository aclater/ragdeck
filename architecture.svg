<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a2e; }
      .box { fill: #16213e; stroke: #e2e8f0; }
      .box-highlight { fill: #1a365d; stroke: #63b3ed; }
      .box-external { fill: #1c1c1c; stroke: #718096; }
      .box-proposed { fill: #1c1c1c; stroke: #718096; stroke-dasharray: 6,3; }
      .text { fill: #e2e8f0; }
      .text-dim { fill: #a0aec0; }
      .text-accent { fill: #63b3ed; }
      .text-warn { fill: #f6ad55; }
      .text-proposed { fill: #718096; font-style: italic; }
      .arrow { stroke: #63b3ed; fill: #63b3ed; }
      .arrow-dim { stroke: #718096; fill: #718096; }
      .arrow-proposed { stroke: #718096; fill: #718096; stroke-dasharray: 6,3; }
      .label-bg { fill: #2d3748; }
      .section-bg { fill: #16213e; stroke: #4a5568; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .box { fill: #f7fafc; stroke: #2d3748; }
      .box-highlight { fill: #ebf8ff; stroke: #3182ce; }
      .box-external { fill: #f9f9f9; stroke: #a0aec0; }
      .box-proposed { fill: #f9f9f9; stroke: #a0aec0; stroke-dasharray: 6,3; }
      .text { fill: #1a202c; }
      .text-dim { fill: #718096; }
      .text-accent { fill: #2b6cb0; }
      .text-warn { fill: #c05621; }
      .text-proposed { fill: #a0aec0; font-style: italic; }
      .arrow { stroke: #3182ce; fill: #3182ce; }
      .arrow-dim { stroke: #a0aec0; fill: #a0aec0; }
      .arrow-proposed { stroke: #a0aec0; fill: #a0aec0; stroke-dasharray: 6,3; }
      .label-bg { fill: #edf2f7; }
      .section-bg { fill: #f7fafc; stroke: #cbd5e0; }
    }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" class="arrow"/>
    </marker>
    <marker id="ahd" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" class="arrow-dim"/>
    </marker>
  </defs>

  <rect width="960" height="720" class="bg" rx="8"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="bold" class="text">ragdeck — admin UI hub</text>
  <text x="480" y="50" text-anchor="middle" font-size="11" class="text-dim">Single-pane management for the rag-suite stack</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- FRONTEND PAGES (top section) -->
  <rect x="120" y="64" width="720" height="58" rx="6" class="section-bg" fill-opacity="0.5"/>
  <text x="140" y="82" font-size="10" font-weight="600" class="text-dim">FRONTEND PAGES</text>

  <rect x="135" y="90" width="90" height="24" rx="4" class="box"/>
  <text x="180" y="106" text-anchor="middle" font-size="10" class="text">Dashboard</text>

  <rect x="237" y="90" width="90" height="24" rx="4" class="box"/>
  <text x="282" y="106" text-anchor="middle" font-size="10" class="text">Collections</text>

  <rect x="339" y="90" width="90" height="24" rx="4" class="box"/>
  <text x="384" y="106" text-anchor="middle" font-size="10" class="text">Query Log</text>

  <rect x="441" y="90" width="70" height="24" rx="4" class="box"/>
  <text x="476" y="106" text-anchor="middle" font-size="10" class="text">Ingest</text>

  <rect x="523" y="90" width="70" height="24" rx="4" class="box"/>
  <text x="558" y="106" text-anchor="middle" font-size="10" class="text">Metrics</text>

  <rect x="605" y="90" width="70" height="24" rx="4" class="box"/>
  <text x="640" y="106" text-anchor="middle" font-size="10" class="text">Admin</text>

  <!-- Proposed pages (dotted) -->
  <rect x="687" y="90" width="70" height="24" rx="4" class="box-proposed"/>
  <text x="722" y="106" text-anchor="middle" font-size="10" class="text-proposed">Probes</text>

  <rect x="769" y="90" width="56" height="24" rx="4" class="box-proposed"/>
  <text x="797" y="106" text-anchor="middle" font-size="9" class="text-proposed">Live Dash</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- RAGDECK CORE BOX -->
  <rect x="250" y="140" width="460" height="110" rx="8" class="box-highlight" stroke-width="2" fill-opacity="0.3"/>
  <text x="270" y="164" font-size="15" font-weight="bold" class="text-accent">ragdeck :8092</text>
  <text x="270" y="182" font-size="10" class="text-dim">FastAPI backend + vanilla HTML/JS/CSS frontend</text>

  <!-- Internal capabilities -->
  <rect x="270" y="194" width="120" height="20" rx="3" class="label-bg"/>
  <text x="330" y="208" text-anchor="middle" font-size="9" class="text-dim">API proxy / fan-out</text>

  <rect x="400" y="194" width="130" height="20" rx="3" class="label-bg"/>
  <text x="465" y="208" text-anchor="middle" font-size="9" class="text-dim">Auth (ADMIN_TOKEN)</text>

  <rect x="540" y="194" width="150" height="20" rx="3" class="label-bg"/>
  <text x="615" y="208" text-anchor="middle" font-size="9" class="text-dim">Agentic observability</text>

  <!-- Arrows from frontend to ragdeck -->
  <line x1="480" y1="114" x2="480" y2="140" class="arrow" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- BACKEND SERVICES (fan-out connections) -->

  <!-- ragpipe -->
  <rect x="40" y="310" width="170" height="60" rx="5" class="box-external"/>
  <text x="125" y="333" text-anchor="middle" font-weight="600" font-size="12" class="text">ragpipe</text>
  <text x="125" y="349" text-anchor="middle" font-size="10" class="text-dim">:8090</text>
  <text x="125" y="363" text-anchor="middle" font-size="9" class="text-dim">config, admin, reload</text>
  <line x1="350" y1="250" x2="170" y2="310" class="arrow-dim" stroke-width="1.5" marker-end="url(#ahd)"/>
  <!-- Label -->
  <rect x="220" y="266" width="100" height="16" rx="3" class="label-bg"/>
  <text x="270" y="278" text-anchor="middle" font-size="8" class="text-dim">/admin/config</text>

  <!-- ragstuffer -->
  <rect x="230" y="310" width="170" height="60" rx="5" class="box-external"/>
  <text x="315" y="333" text-anchor="middle" font-weight="600" font-size="12" class="text">ragstuffer</text>
  <text x="315" y="349" text-anchor="middle" font-size="10" class="text-dim">:8091</text>
  <text x="315" y="363" text-anchor="middle" font-size="9" class="text-dim">ingest status, trigger</text>
  <line x1="420" y1="250" x2="350" y2="310" class="arrow-dim" stroke-width="1.5" marker-end="url(#ahd)"/>
  <!-- Label -->
  <rect x="350" y="266" width="100" height="16" rx="3" class="label-bg"/>
  <text x="400" y="278" text-anchor="middle" font-size="8" class="text-dim">/ingest/status</text>

  <!-- ragwatch -->
  <rect x="560" y="310" width="170" height="60" rx="5" class="box-external"/>
  <text x="645" y="333" text-anchor="middle" font-weight="600" font-size="12" class="text">ragwatch</text>
  <text x="645" y="349" text-anchor="middle" font-size="10" class="text-dim">:9090</text>
  <text x="645" y="363" text-anchor="middle" font-size="9" class="text-dim">Prometheus metrics</text>
  <line x1="540" y1="250" x2="610" y2="310" class="arrow-dim" stroke-width="1.5" marker-end="url(#ahd)"/>
  <!-- Label -->
  <rect x="530" y="266" width="80" height="16" rx="3" class="label-bg"/>
  <text x="570" y="278" text-anchor="middle" font-size="8" class="text-dim">/metrics</text>

  <!-- ragorchestrator -->
  <rect x="750" y="310" width="170" height="60" rx="5" class="box-external"/>
  <text x="835" y="333" text-anchor="middle" font-weight="600" font-size="12" class="text">ragorchestrator</text>
  <text x="835" y="349" text-anchor="middle" font-size="10" class="text-dim">:8095</text>
  <text x="835" y="363" text-anchor="middle" font-size="9" class="text-dim">health, agentic stats</text>
  <line x1="620" y1="250" x2="790" y2="310" class="arrow-dim" stroke-width="1.5" marker-end="url(#ahd)"/>
  <!-- Label -->
  <rect x="650" y="262" width="100" height="16" rx="3" class="label-bg"/>
  <text x="700" y="274" text-anchor="middle" font-size="8" class="text-dim">/agentic/stats</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- DATA STORES -->

  <!-- Qdrant -->
  <rect x="140" y="430" width="170" height="60" rx="5" class="box-external"/>
  <text x="225" y="453" text-anchor="middle" font-weight="600" font-size="12" class="text">Qdrant</text>
  <text x="225" y="469" text-anchor="middle" font-size="10" class="text-dim">:6333</text>
  <text x="225" y="483" text-anchor="middle" font-size="9" class="text-dim">collections, vector counts</text>
  <line x1="125" y1="370" x2="200" y2="430" class="arrow-dim" stroke-width="1.5" marker-end="url(#ahd)"/>

  <!-- Postgres -->
  <rect x="640" y="430" width="170" height="60" rx="5" class="box-external"/>
  <text x="725" y="453" text-anchor="middle" font-weight="600" font-size="12" class="text">Postgres</text>
  <text x="725" y="469" text-anchor="middle" font-size="10" class="text-dim">:5432</text>
  <text x="725" y="483" text-anchor="middle" font-size="9" class="text-dim">query_log, collections</text>
  <line x1="645" y1="370" x2="700" y2="430" class="arrow-dim" stroke-width="1.5" marker-end="url(#ahd)"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- PROPOSED (dotted) -->

  <!-- ragprobe -->
  <rect x="370" y="430" width="170" height="60" rx="5" class="box-proposed"/>
  <text x="455" y="453" text-anchor="middle" font-weight="600" font-size="12" class="text-proposed">ragprobe</text>
  <text x="455" y="469" text-anchor="middle" font-size="10" class="text-proposed">Ragas quality results</text>
  <text x="455" y="483" text-anchor="middle" font-size="9" class="text-proposed">proposed integration</text>
  <line x1="400" y1="370" x2="430" y2="430" class="arrow-proposed" stroke-width="1.5" marker-end="url(#ahd)"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- Proxy pattern explanation -->
  <rect x="40" y="530" width="880" height="70" rx="6" class="section-bg" fill-opacity="0.5"/>
  <text x="60" y="550" font-size="10" font-weight="600" class="text-dim">PROXY / FAN-OUT PATTERN</text>
  <text x="60" y="568" font-size="10" class="text-dim">ragdeck proxies all backend calls — the frontend never contacts services directly.</text>
  <text x="60" y="584" font-size="10" class="text-dim">Metrics from ragwatch, config from ragpipe, ingest triggers to ragstuffer, agentic traces from query_log + ragorchestrator.</text>

  <!-- Legend -->
  <rect x="40" y="618" width="880" height="50" rx="6" class="section-bg" fill-opacity="0.3"/>
  <text x="60" y="636" font-size="10" font-weight="600" class="text-dim">LEGEND</text>
  <line x1="120" y1="633" x2="160" y2="633" class="arrow-dim" stroke-width="1.5" marker-end="url(#ahd)"/>
  <text x="168" y="637" font-size="9" class="text-dim">Current connection</text>
  <line x1="300" y1="633" x2="340" y2="633" class="arrow-proposed" stroke-width="1.5" marker-end="url(#ahd)"/>
  <text x="348" y="637" font-size="9" class="text-proposed">Proposed</text>
  <rect x="440" y="625" width="50" height="16" rx="3" class="box"/>
  <text x="465" y="637" text-anchor="middle" font-size="9" class="text-dim">Current</text>
  <rect x="510" y="625" width="50" height="16" rx="3" class="box-proposed"/>
  <text x="535" y="637" text-anchor="middle" font-size="9" class="text-proposed">Proposed</text>

  <!-- Footer -->
  <text x="480" y="690" text-anchor="middle" font-size="10" class="text-dim">github.com/aclater/ragdeck — AGPL-3.0</text>
</svg>
